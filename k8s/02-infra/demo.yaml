---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: demo
  namespace: yr-demos-7wcpt
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 192.168.156.0/20
    services:
      cidrBlocks:
        - 10.96.0.0/12
    serviceDomain: cluster.local
  topology:
    classRef:
      name: builtin-generic-v3.7.0
      namespace: vmware-system-vks-public
    version: v1.35.5---vmware.1-vkr.1
    variables:
      - name: vmClass
        value: best-effort-large
      - name: storageClass
        value: wkld01-cluster01-optimal-datastore-default-policy-autoraid
      - name: vsphereOptions
        value:
          persistentVolumes:
            availableStorageClasses:
              - wkld01-cluster01-optimal-datastore-default-policy-autoraid
            defaultStorageClass: >-
              wkld01-cluster01-optimal-datastore-default-policy-autoraid-latebinding
    controlPlane:
      replicas: 1
      metadata:
        annotations:
          run.tanzu.vmware.com/resolve-os-image: >-
            os-name=ubuntu, content-library=cl-bab712043ac0065d3,
            os-version=24.04
    workers:
      machineDeployments:
        - class: node-pool
          name: demo-np
          metadata:
            annotations:
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: '5'
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: '2'
              run.tanzu.vmware.com/resolve-os-image: >-
                os-name=ubuntu, content-library=cl-bab712043ac0065d3,
                os-version=24.04
---
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonInstall
metadata:
  name: helm-controller-demo
  namespace: yr-demos-7wcpt
spec:
  addonRef:
    name: helm-controller
  clusters:
  - selector:
      matchLabels:
        cluster.x-k8s.io/cluster-name: demo
---
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonInstall
metadata:
  name: cert-manager-demo
  namespace: yr-demos-7wcpt
spec:
  addonRef:
    name: cert-manager
  clusters:
  - selector:
      matchLabels:
        cluster.x-k8s.io/cluster-name: demo
---
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonInstall
metadata:
  name: prometheus-demo
  namespace: yr-demos-7wcpt
spec:
  addonRef:
    name: prometheus
  clusters:
  - selector:
      matchLabels:
        cluster.x-k8s.io/cluster-name: demo
---
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonConfig
metadata:
  annotations:
    clusteraddon.addons.kubernetes.vmware.com/owned-for-deletion: "true"
  name: demo-prometheus
  namespace: yr-demos-7wcpt
spec:
  values:
    deploycomponents:
      alertmanager: false
      kube-state-metrics: true
      node-exporter: true
      prometheus: true
      prometheus-operator: true
      pushgateway: false
---
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonInstall
metadata:
  name: istio-demo
  namespace: yr-demos-7wcpt
spec:
  addonRef:
    name: istio
  clusters:
  - selector:
      matchLabels:
        cluster.x-k8s.io/cluster-name: demo
---

apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonConfig
metadata:
  annotations:
    clusteraddon.addons.kubernetes.vmware.com/owned-for-deletion: "true"
  name: demo-istio
  namespace: yr-demos-7wcpt 
spec:
  values:
    istio:
      ambientMode:
        enabled: false
        ztunnel:
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
      enableGatewayAPIInference: false
      enableStrictMTLS: true
      gateways:
        egress:
          autoscaling:
            enabled: false
            maxReplicas: 5
            minReplicas: 1
          enabled: true
          namespace: istio-egress
          namespaceLimitRange:
            defaultRequests:
              cpu: 100m
              memory: 128Mi
          priorityClassName: ""
          replicas: 1
          resources:
            limits:
              cpu: 2000m
              memory: 1024Mi
            requests:
              cpu: 100m
              memory: 128Mi
        ingress:
          autoscaling:
            enabled: true
            maxReplicas: 5
            minReplicas: 1
          enabled: true
          namespace: istio-ingress
          namespaceLimitRange:
            defaultRequests:
              cpu: 100m
              memory: 128Mi
          priorityClassName: ""
          replicas: 1
          resources:
            limits:
              cpu: 2000m
              memory: 1024Mi
            requests:
              cpu: 100m
              memory: 128Mi
      istioCNI:
        enabled: true
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
      meshConfig:
        accessLogFile: /dev/stdout
        connectTimeout: 10s
        enableDNSProxy: true
        enablePrometheusMerge: true
        enableTracing: true
        externalIstiod: false
        ingressControllerMode: STRICT
        ingressSelector: ingressgateway
        meshID: "yr-mesh"
        meshMTLS:
          minProtocolVersion: TLSV1_3
        network: ""
        proxy:
          resources:
            limits:
              cpu: 2000m
              memory: 1024Mi
            requests:
              cpu: 100m
              memory: 128Mi
        trustDomain: cluster.local
        trustDomainAliases: []
        waypoint:
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 128Mi
      namespace: istio-system
      namespaceLimitRange:
        defaultRequests:
          cpu: 100m
          memory: 64Mi
      pilot:
        autoscaling:
          enabled: false
          maxReplicas: 5
          minReplicas: 1
        priorityClassName: ""
        replicas: 2
        resources:
          requests:
            cpu: 500m
            memory: 2048Mi
      support:
        priorityClassName: ""
        resources:
          requests:
            cpu: 100m
            memory: 64Mi

---
