---
# Let's Encrypt via Cloudflare DNS-01 — chosen over HTTP-01 specifically so
# the gateway's LoadBalancer doesn't need to be internet-reachable; DNS-01
# only requires the Cloudflare API token to create a TXT record proving
# domain ownership.
#
# apiTokenSecretRef points at "cloudflare-credentials" in cert-manager's own
# namespace — materialized by the sync Job in 05-cloudflare-secret-sync.yaml.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # Only used for ACME expiry/revocation notices — change if this isn't
    # the right contact for cert lifecycle emails on this demo cluster.
    email: yogi.rampuria@broadcom.com
    privateKeySecretRef:
      name: letsencrypt-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-credentials
              key: CLOUDFLARE_API_TOKEN


# Certificate resource intentionally not created yet — DNS-01 auth against
# Cloudflare is confirmed working (the TXT record gets created successfully),
# but cert-manager's own propagation self-check queries Cloudflare's
# authoritative nameservers directly on port 53, which times out here
# (looks like egress to arbitrary external IPs on 53 is firewalled). A
# Certificate referencing this ClusterIssuer would just retry the ACME
# order forever. Re-add once port 53 egress (or an internal resolver
