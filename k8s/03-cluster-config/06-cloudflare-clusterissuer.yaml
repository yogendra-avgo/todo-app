---
# Let's Encrypt via Cloudflare DNS-01 — chosen over HTTP-01 specifically so
# the gateway's LoadBalancer doesn't need to be internet-reachable; DNS-01
# only requires the Cloudflare API token to create a TXT record proving
# domain ownership.
#
# apiTokenSecretRef points at "cloudflare-credentials" in cert-manager's own
# namespace — materialized by the sync Job in 05-cloudflare-secret-sync.yaml.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # Only used for ACME expiry/revocation notices — change if this isn't
    # the right contact for cert lifecycle emails on this demo cluster.
    email: yogi.rampuria@broadcom.com
    privateKeySecretRef:
      name: letsencrypt-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-credentials
              key: CLOUDFLARE_API_TOKEN

---
# Output secret (wepositive-wildcard-tls) lands in istio-ingress because
# that's where the shared Gateway's workload runs — Istio's SIMPLE TLS mode
# looks up credentialName in the Gateway's own namespace.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wepositive-wildcard
  namespace: istio-ingress
spec:
  secretName: wepositive-wildcard-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "*.wepositive.org"
    - "wepositive.org"
