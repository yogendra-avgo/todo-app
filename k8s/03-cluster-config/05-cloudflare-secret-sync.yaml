---
# Bridges the KeyValueSecret "yr-cloudflare" (supervisor namespace
# yr-demos-7wcpt, Vault-backed via the vault-injector addon) into a real K8s
# Secret that cert-manager's ClusterIssuer and external-dns can actually
# reference via secretKeyRef — Vault Agent Injector only writes credentials
# to a file inside an annotated pod, it doesn't create Secret objects.
#
# Runs as an ArgoCD PreSync hook (not a plain Job) for two reasons:
#   - Guarantees the Secret exists before the ClusterIssuer/external-dns
#     Deployment that reference it get applied in the same sync.
#   - Job pod specs are immutable, so a plain Job would fail to reconcile on
#     the second sync; hook-delete-policy: HookSucceeded deletes it after
#     each successful run so ArgoCD can freely recreate it on the next sync
#     (e.g. after the Cloudflare token rotates in Vault).
#
# Duplicated per-namespace (cert-manager, external-dns) rather than synced
# cross-namespace via secretgen-controller — that controller isn't deployed
# on this cluster, only on the supervisor.

apiVersion: v1
kind: Namespace
metadata:
  name: external-dns

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudflare-secret-sync
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/hook: PreSync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudflare-secret-sync
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/hook: PreSync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudflare-secret-sync
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/hook: PreSync
subjects:
  - kind: ServiceAccount
    name: cloudflare-secret-sync
    namespace: cert-manager
roleRef:
  kind: Role
  name: cloudflare-secret-sync
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cloudflare-secret-sync
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "yr-demos-7wcpt/yr-lab"
        vault.hashicorp.com/auth-path: "auth/kubernetes-yr-demos-7wcpt-yr-lab"
        vault.hashicorp.com/agent-inject-secret-cloudflare.env: "secret/data/yr-demos-7wcpt/yr-lab-yr-cloudflare"
        vault.hashicorp.com/agent-inject-template-cloudflare.env: |
          {{- with secret "secret/data/yr-demos-7wcpt/yr-lab-yr-cloudflare" -}}
          CLOUDFLARE_API_TOKEN={{ .Data.data.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID={{ .Data.data.CLOUDFLARE_ZONE_ID }}
          {{- end -}}
    spec:
      serviceAccountName: cloudflare-secret-sync
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: sync
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              . /vault/secrets/cloudflare.env
              kubectl create secret generic cloudflare-credentials \
                --namespace=cert-manager \
                --from-literal=CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN" \
                --from-literal=CLOUDFLARE_ZONE_ID="$CLOUDFLARE_ZONE_ID" \
                --dry-run=client -o yaml | kubectl apply -f -
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudflare-secret-sync
  namespace: external-dns
  annotations:
    argocd.argoproj.io/hook: PreSync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudflare-secret-sync
  namespace: external-dns
  annotations:
    argocd.argoproj.io/hook: PreSync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudflare-secret-sync
  namespace: external-dns
  annotations:
    argocd.argoproj.io/hook: PreSync
subjects:
  - kind: ServiceAccount
    name: cloudflare-secret-sync
    namespace: external-dns
roleRef:
  kind: Role
  name: cloudflare-secret-sync
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cloudflare-secret-sync
  namespace: external-dns
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "yr-demos-7wcpt/yr-lab"
        vault.hashicorp.com/auth-path: "auth/kubernetes-yr-demos-7wcpt-yr-lab"
        vault.hashicorp.com/agent-inject-secret-cloudflare.env: "secret/data/yr-demos-7wcpt/yr-lab-yr-cloudflare"
        vault.hashicorp.com/agent-inject-template-cloudflare.env: |
          {{- with secret "secret/data/yr-demos-7wcpt/yr-lab-yr-cloudflare" -}}
          CLOUDFLARE_API_TOKEN={{ .Data.data.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID={{ .Data.data.CLOUDFLARE_ZONE_ID }}
          {{- end -}}
    spec:
      serviceAccountName: cloudflare-secret-sync
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: sync
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              . /vault/secrets/cloudflare.env
              kubectl create secret generic cloudflare-credentials \
                --namespace=external-dns \
                --from-literal=CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN" \
                --from-literal=CLOUDFLARE_ZONE_ID="$CLOUDFLARE_ZONE_ID" \
                --dry-run=client -o yaml | kubectl apply -f -
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
