---
# Implements the metrics.k8s.io aggregated API — needed for `kubectl top`,
# HPA, and headlamp's own CPU/memory graphs (headlamp-metrics-reader in
# 01-headlamp.yaml already grants RBAC for this API; nothing actually
# implemented it until now — kube-state-metrics/node-exporter feed
# Prometheus, a separate thing). Deployed via the same helm-controller addon
# used for Grafana (see 04-grafana.yaml).
#
# --kubelet-insecure-tls: kubelets here serve self-signed certs not in any
# trusted chain — same reason the kubelet/cadvisor ServiceMonitors in
# 02-prometheus.yaml use insecureSkipVerify: true. Without it metrics-server
# can't scrape kubelets at all.
#
# ClusterIP only (service.type default) — ClusterIP so private to the
# cluster, no VirtualService/external route.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metrics-server
  namespace: tanzu-system-monitoring
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/metrics-server/

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: tanzu-system-monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: metrics-server
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: tanzu-system-monitoring
  values:
    args:
      - --kubelet-insecure-tls
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
