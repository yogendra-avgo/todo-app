## Headlamp RBAC
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-metrics-reader
rules:
- apiGroups:
  - metrics.k8s.io
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-metrics-reader-binding
subjects:
- kind: ServiceAccount
  name: headlamp
  namespace: headlamp
roleRef:
  kind: ClusterRole
  name: headlamp-metrics-reader
  apiGroup: rbac.authorization.k8s.io

---
# headlamp always terminates TLS itself — the addon's chart hardcodes
# -tls-cert-path/-tls-key-path container args regardless of
# tls.certManager.enabled, there's no supported way to make it serve plain
# HTTP (confirmed by inspecting the live container args). So the shared
# gateway terminates TLS for the CLIENT, then re-encrypts to reach headlamp.
# insecureSkipVerify because headlamp's own CA is self-signed and not in
# Istio's trust store.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: headlamp
  namespace: headlamp
spec:
  host: headlamp.headlamp.svc.cluster.local
  trafficPolicy:
    tls:
      mode: SIMPLE
      insecureSkipVerify: true

---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: headlamp-route
  namespace: headlamp
spec:
  hosts:
    - cluster-dashboard.wepositive.org
  gateways:
    - istio-ingress/shared-gateway
  http:
    - route:
        - destination:
            host: headlamp.headlamp.svc.cluster.local
            port:
              number: 80
