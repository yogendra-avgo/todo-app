## Headlamp RBAC
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-metrics-reader
rules:
- apiGroups:
  - metrics.k8s.io
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-metrics-reader-binding
subjects:
- kind: ServiceAccount
  name: headlamp
  namespace: headlamp
roleRef:
  kind: ClusterRole
  name: headlamp-metrics-reader
  apiGroup: rbac.authorization.k8s.io
