---
# ArgoCD Application for the platform/cluster-services layer (k8s/03-cluster-services
# only): headlamp RBAC, Prometheus + ServiceMonitors, Grafana (via the
# helm-controller addon's HelmRepository/HelmRelease CRDs), and the shared
# Istio Gateway. Kept as its own Application, separate from todo-app
# (see 02-todo-app-application.yaml), so platform-layer changes and app-layer
# releases don't share a blast radius.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-services
  namespace: yr-demos-7wcpt
spec:
  project: default
  source:
    repoURL: https://github.com/yogendra-avgo/todo-app.git
    targetRevision: main
    path: k8s/03-cluster-services
  destination:
    name: yr-lab
    namespace: tanzu-system-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
