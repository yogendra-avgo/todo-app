---
# ============================================================
# Locust Load Generator — drives traffic against the todo-app
# so that HTTP/task metrics flow into Prometheus for demo purposes.
#
# Locust lives in the same namespace as the app (todo-app) and talks to it
# over the in-cluster Service DNS name directly, rather than through the
# shared Gateway, so load generation stays inside the mesh.
#
# locustfile.py is baked into the image at build time (see app/locust/Dockerfile)
# and published to ghcr.io/yogendra-avgo/todo-app-locust — rebuild/push a new
# tag whenever app/locust/locustfile.py changes.
#
# The Istio VirtualService resources here are for HUMAN browser access,
# routed by hostname on the shared platform Gateway (istio-ingress/shared-gateway,
# defined in k8s/03-cluster-config — classic networking.istio.io
# Gateway/VirtualService API, not the Kubernetes Gateway API; see the comment
# there for why):
#   todo.wepositive.org    -> todo-web-svc (see VirtualService in 01-app.yaml)
#   testing.wepositive.org -> locust-svc   (Locust's own web UI, VirtualService below)
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
  template:
    metadata:
      labels:
        app: locust
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: locust
          image: ghcr.io/yogendra-avgo/todo-app-locust:v2
          args:
            - "-f"
            - "/mnt/locust/locustfile.py"
            - "--host=http://todo-web-svc"
            - "--web-host=0.0.0.0"
            - "--autostart"
            - "--users=10"
            - "--spawn-rate=2"
          ports:
            - containerPort: 8089
              name: web-ui
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: locust-svc
  namespace: todo-app
  labels:
    app: locust
spec:
  # Exposed externally via the Istio VirtualService below (hostname
  # testing.wepositive.org).
  type: ClusterIP
  ports:
    - port: 8089
      targetPort: 8089
      name: web-ui
  selector:
    app: locust

---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: locust-route
  namespace: todo-app
spec:
  hosts:
    - testing.wepositive.org
  gateways:
    - istio-ingress/shared-gateway
  http:
    - route:
        - destination:
            host: locust-svc
            port:
              number: 8089
