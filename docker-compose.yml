services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Ensures the container is marked healthy only when pg_isready returns 0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: ghcr.io/yogendra-avgo/todo-app:latest
    build:
      context: ./app
      platforms:
        - linux/amd64
        - linux/arm64
      args:
        - NPM_REGISTRY=https://packages.vcfd.broadcom.net/artifactory/api/npm/npm/
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/todo
    depends_on:
      db:
        # Blocks web execution until the db healthcheck passes successfully
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  locust:
    image: ghcr.io/yogendra-avgo/todo-app-locust:latest
    build:
      context: ./app/locust
      platforms:
        - linux/amd64
        - linux/arm64
    command:
      - "-f"
      - "/mnt/locust/locustfile.py"
      - "--host=http://web:3000"
      - "--web-host=0.0.0.0"
      - "--autostart"
      - "--users=10"
      - "--spawn-rate=2"
    ports:
      - "8089:8089"
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata: