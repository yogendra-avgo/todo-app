name: Release

on:
  push:
    tags: ['*']
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to build & release
        required: true

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-task@v2

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: release
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        run: task cd:build-push
        env:
          CI_REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
          CI_IMAGE_TAG: ${{ steps.release.outputs.tag }}

      - name: Build and push locust image
        run: task cd:build-push-locust
        env:
          CI_REGISTRY_IMAGE: ghcr.io/${{ github.repository }}-locust
          CI_IMAGE_TAG: ${{ steps.release.outputs.tag }}

      - name: Open PR bumping k8s image tags
        run: task cd:bump-k8s-images
        env:
          CI_IMAGE_TAG: ${{ steps.release.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
